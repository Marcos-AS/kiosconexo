<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial</title>
    <style>
        .filtros {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        .filtro-grupo {
            margin-bottom: 15px;
        }
        .filtro-grupo label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .filtro-grupo input,
        .filtro-grupo select {
            padding: 8px;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Historial de compras por producto</h1>
    <div class="filtros">
        <div class="filtro-grupo">
            <label>Buscar producto:</label>
            <input type="text" id="buscadorProducto" placeholder="Nombre o EAN">
        </div>
        <div class="filtro-grupo">
            <label>Categoría:</label>
            <select id="filtroCategoria">
                <option value="">Todas las categorías</option>
            </select>
        </div>
        <div class="filtro-grupo">
            <label>Marca:</label>
            <select id="filtroMarca">
                <option value="">Todas las marcas</option>
            </select>
        </div>
    </div>
    <div id="comprasAgrupadas"></div>

<script>
async function cargarCompras() {
    // Pide todas las compras (quita el límite en el backend si ?all=true)
    const res = await fetch('/compras?all=true');
    return await res.json();
}

let comprasGlobal = [];
let agrupadoGlobal = {};

function agruparCompras(compras) {
    const agrupado = {};
    compras.forEach(c => {
        if (!agrupado[c.producto_nombre]) agrupado[c.producto_nombre] = [];
        agrupado[c.producto_nombre].push(c);
    });
    return agrupado;
}

function obtenerCategorias(compras) {
    const categorias = new Set();
    compras.forEach(c => {
        if (c.categoria_nombre) categorias.add(c.categoria_nombre);
    });
    return Array.from(categorias).sort();
}

function obtenerMarcas(compras) {
    const marcas = new Set();
    compras.forEach(c => {
        if (c.marca_nombre) marcas.add(c.marca_nombre);
    });
    return Array.from(marcas).sort();
}

function llenarSelectores() {
    const categorias = obtenerCategorias(comprasGlobal);
    const marcas = obtenerMarcas(comprasGlobal);

    const selectCategoria = document.getElementById('filtroCategoria');
    const selectMarca = document.getElementById('filtroMarca');

    categorias.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        selectCategoria.appendChild(option);
    });

    marcas.forEach(marca => {
        const option = document.createElement('option');
        option.value = marca;
        option.textContent = marca;
        selectMarca.appendChild(option);
    });
}

function renderComprasAgrupadas(filtro = '', categoria = '', marca = '') {
    const contenedor = document.getElementById('comprasAgrupadas');
    contenedor.innerHTML = '';

    Object.entries(agrupadoGlobal).forEach(([producto, lista]) => {
        // Filtrar por búsqueda de producto
        const coincideBusqueda = 
            producto.toLowerCase().includes(filtro.toLowerCase()) ||
            lista.some(c => c.producto_nombre.toLowerCase().includes(filtro.toLowerCase()) || c.producto_ean?.includes(filtro));

        if (!coincideBusqueda) return;

        // Filtrar por categoría y marca
        const listaFiltrada = lista.filter(c => {
            const coincideCategoria = !categoria || c.categoria_nombre === categoria;
            const coincideMarca = !marca || c.marca_nombre === marca;
            return coincideCategoria && coincideMarca;
        });

        if (listaFiltrada.length === 0) return;

        listaFiltrada.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

        // Verifica si hay algún valor de gramos en la lista
        const mostrarGramos = listaFiltrada.some(c => c.gramos !== null && c.gramos !== undefined && c.gramos !== '');

        const div = document.createElement('div');
        div.style.marginBottom = '15px';
        div.innerHTML = `
            <h3>${producto}</h3>
            <table border="1" style="width:100%; font-size:0.95em;">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Proveedor</th>
                        <th>Categoría</th>
                        <th>Marca</th>
                        <th>Cantidad</th>
                        ${mostrarGramos ? '<th>Gramos</th>' : ''}
                        <th>Precio de compra</th>
                    </tr>
                </thead>
                <tbody>
                    ${listaFiltrada.map(c => `
                        <tr>
                            <td>${c.fecha.split('T')[0]}</td>
                            <td>${c.proveedor_nombre}</td>
                            <td>${c.categoria_nombre ?? '-'}</td>
                            <td>${c.marca_nombre ?? '-'}</td>
                            <td>${c.cantidad}</td>
                            ${mostrarGramos ? `<td>${c.gramos ?? '-'}</td>` : ''}
                            <td>$${parseFloat(c.precio_compra).toFixed(2)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        contenedor.appendChild(div);
    });
}

function actualizarFiltros() {
    const filtroProducto = document.getElementById('buscadorProducto').value.trim();
    const filtroCategoria = document.getElementById('filtroCategoria').value;
    const filtroMarca = document.getElementById('filtroMarca').value;
    
    renderComprasAgrupadas(filtroProducto, filtroCategoria, filtroMarca);
}

document.getElementById('buscadorProducto').addEventListener('input', actualizarFiltros);
document.getElementById('filtroCategoria').addEventListener('change', actualizarFiltros);
document.getElementById('filtroMarca').addEventListener('change', actualizarFiltros);

window.addEventListener('DOMContentLoaded', async () => {
    comprasGlobal = await cargarCompras();
    agrupadoGlobal = agruparCompras(comprasGlobal);
    llenarSelectores();
    renderComprasAgrupadas();
});
</script>
</body>
</html>
